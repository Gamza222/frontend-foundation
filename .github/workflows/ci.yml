name: Continuous Integration

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # CI ORCHESTRATOR
  # ============================================================================

  ci-pipeline:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quick validation
        run: |
          echo "🚀 CI Pipeline - Quick Validation"
          echo "📋 Running essential checks..."

          # Quick type check
          npm run type-check

          # Quick lint check
          npm run lint

          echo "✅ Quick validation passed"
          echo "📋 Full pipeline will run in parallel workflows"

  # ============================================================================
  # NOTIFICATION
  # ============================================================================

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: ci-pipeline
    if: always()

    steps:
      - name: Notify on success
        if: needs.ci-pipeline.result == 'success'
        run: |
          echo "🎉 CI Pipeline completed successfully!"
          echo "✅ All essential checks passed"
          echo "🚀 Ready for full pipeline execution"

      - name: Notify on failure
        if: needs.ci-pipeline.result == 'failure'
        run: |
          echo "❌ CI Pipeline failed!"
          echo "🔍 Please check the logs for details"
          exit 1
