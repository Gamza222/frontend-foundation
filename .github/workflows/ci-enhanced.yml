name: Enhanced CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  # These will be dynamically set from centralized config

jobs:
  # ============================================================================
  # CODE QUALITY & TESTING
  # ============================================================================

  quality-check:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version and config info
        run: |
          echo "=== Version Information ==="
          npx ts-node --project tsconfig.scripts.json scripts/version.ts current
          echo "=== Environment Configuration ==="
          npx ts-node --project tsconfig.scripts.json scripts/version.ts env
          echo "=== CI Configuration ==="
          npx ts-node --project tsconfig.scripts.json scripts/version.ts ci

      - name: Set environment variables from config
        run: |
          COVERAGE_THRESHOLD=$(npx ts-node --project tsconfig.scripts.json -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log(config.test.coverageThreshold);")
          echo "COVERAGE_THRESHOLD=$COVERAGE_THRESHOLD" >> $GITHUB_ENV
          echo "Set coverage threshold to: $COVERAGE_THRESHOLD"

      - name: Type checking
        run: npm run type-check

      - name: Linting
        run: npm run lint

      - name: Format checking
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/lcov-report/index.html | grep -o 'coverage: [0-9.]*%' | grep -o '[0-9.]*')
          echo "Coverage: ${COVERAGE}%"
          echo "Threshold: ${COVERAGE_THRESHOLD}%"
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${COVERAGE_THRESHOLD}%"
          fi

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get security config
        run: |
          echo "=== Security Configuration ==="
          node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log('Vulnerability Threshold:', config.security.vulnerabilityThreshold); console.log('Audit Level:', config.security.auditLevel); console.log('Snyk Threshold:', config.security.snykThreshold);"

      - name: Set security thresholds from config
        run: |
          VULNERABILITY_THRESHOLD=$(node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log(config.security.vulnerabilityThreshold);")
          AUDIT_LEVEL=$(node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log(config.security.auditLevel);")
          SNYK_THRESHOLD=$(node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log(config.security.snykThreshold);")
          echo "VULNERABILITY_THRESHOLD=$VULNERABILITY_THRESHOLD" >> $GITHUB_ENV
          echo "AUDIT_LEVEL=$AUDIT_LEVEL" >> $GITHUB_ENV
          echo "SNYK_THRESHOLD=$SNYK_THRESHOLD" >> $GITHUB_ENV
          echo "Set security thresholds - Vulnerability: $VULNERABILITY_THRESHOLD, Audit: $AUDIT_LEVEL, Snyk: $SNYK_THRESHOLD"

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=${{ env.SNYK_THRESHOLD }} --file=package-lock.json

      - name: Run npm audit
        run: npm audit --audit-level=${{ env.AUDIT_LEVEL }}

      - name: Check for known vulnerabilities
        run: |
          VULNERABILITIES=$(npm audit --json | jq '.vulnerabilities | length')
          echo "Found $VULNERABILITIES vulnerabilities"
          echo "Threshold: $VULNERABILITY_THRESHOLD"
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "❌ Found $VULNERABILITIES vulnerabilities"
            npm audit
            exit 1
          else
            echo "✅ No vulnerabilities found"
          fi

  # ============================================================================
  # PERFORMANCE TESTING
  # ============================================================================

  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get performance config
        run: |
          echo "=== Performance Configuration ==="
          node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log('Lighthouse Threshold:', config.performance.lighthouseThreshold); console.log('Bundle Size Threshold:', config.performance.bundleSizeThreshold); console.log('Load Test Threshold:', config.performance.loadTestThreshold);"

      - name: Set performance thresholds from config
        run: |
          LIGHTHOUSE_THRESHOLD=$(node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log(config.performance.lighthouseThreshold);")
          BUNDLE_SIZE_THRESHOLD=$(node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log(config.performance.bundleSizeThreshold);")
          LOAD_TEST_THRESHOLD=$(node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log(config.performance.loadTestThreshold);")
          echo "LIGHTHOUSE_THRESHOLD=$LIGHTHOUSE_THRESHOLD" >> $GITHUB_ENV
          echo "BUNDLE_SIZE_THRESHOLD=$BUNDLE_SIZE_THRESHOLD" >> $GITHUB_ENV
          echo "LOAD_TEST_THRESHOLD=$LOAD_TEST_THRESHOLD" >> $GITHUB_ENV
          echo "Set performance thresholds - Lighthouse: $LIGHTHOUSE_THRESHOLD, Bundle: $BUNDLE_SIZE_THRESHOLD, Load: $LOAD_TEST_THRESHOLD"

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start application
        run: |
          npm start &
          sleep 10

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './config/performance/lighthouse.config.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Performance budget check
        run: |
          echo "Performance testing completed"
          echo "Lighthouse Threshold: ${LIGHTHOUSE_THRESHOLD}%"
          echo "Bundle Size Threshold: ${BUNDLE_SIZE_THRESHOLD} bytes"
          echo "Load Test Threshold: ${LOAD_TEST_THRESHOLD} ms"

  # ============================================================================
  # BUILD & DEPLOYMENT
  # ============================================================================

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan, performance-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version and environment info
        run: |
          echo "=== Deployment Information ==="
          VERSION=$(npx ts-node --project tsconfig.scripts.json scripts/version.ts display)
          VERSION_INFO=$(npx ts-node --project tsconfig.scripts.json scripts/version.ts info)
          ENV=$(npx ts-node --project tsconfig.scripts.json -e "const { envConfig } = require('./config/env'); console.log(envConfig.appEnv);")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"
          echo "Environment: $ENV"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create build info file
        run: |
          cat > build-info.json << EOF
          {
            "version": "$VERSION",
            "versionInfo": $VERSION_INFO,
            "environment": "$ENV",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "buildTime": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          echo "Created build-info.json:"
          cat build-info.json

      - name: Deploy to Vercel (Preview)
        if: github.ref == 'refs/heads/develop'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "Version: $VERSION"
          echo "Environment: $ENV"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ============================================================================
  # NOTIFICATIONS
  # ============================================================================

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan, performance-test, build-and-deploy]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get notification config
        run: |
          echo "=== Notification Configuration ==="
          node -e "const { getCiConfig } = require('./config/ci/ci.config'); const config = getCiConfig(process.env.NODE_ENV || 'development'); console.log('Slack Enabled:', config.notifications.slack.enabled); console.log('Email Enabled:', config.notifications.email.enabled); console.log('GitHub Enabled:', config.notifications.github.enabled);"

      - name: Notify on success
        if: needs.build-and-deploy.result == 'success'
        run: |
          VERSION=$(npx ts-node --project tsconfig.scripts.json scripts/version.ts display)
          ENV=$(npx ts-node --project tsconfig.scripts.json -e "const { envConfig } = require('./config/env'); console.log(envConfig.appEnv);")
          echo "🎉 CI/CD Pipeline completed successfully!"
          echo "Version: $VERSION"
          echo "Environment: $ENV"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "All checks passed and deployment was successful."

      - name: Notify on failure
        if: needs.build-and-deploy.result == 'failure'
        run: |
          VERSION=$(npx ts-node --project tsconfig.scripts.json scripts/version.ts display)
          ENV=$(npx ts-node --project tsconfig.scripts.json -e "const { envConfig } = require('./config/env'); console.log(envConfig.appEnv);")
          echo "❌ CI/CD Pipeline failed!"
          echo "Version: $VERSION"
          echo "Environment: $ENV"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Please check the logs for details."
          exit 1
